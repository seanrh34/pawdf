name: release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (arm64). Intel (macos-13) is intentionally
        # omitted: GitHub is retiring Intel runners (jobs hang "waiting for a runner")
        # and Intel Macs are a shrinking minority. Re-add macos-13, or switch to a
        # universal-apple-darwin build, if Intel support is needed later.
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PawDF ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            **PawDF** lets you chat with your PDFs — fully local, fully offline. A small AI model (Gemma 4 E2B) runs on your own computer; your documents, questions, and answers never leave your device.

            ### Install
            - **Windows:** download the `.msi` or `.exe` below and run it. SmartScreen may warn about an unrecognized app — click **More info → Run anyway**.
            - **macOS:** download the `.dmg` (Apple Silicon or Intel). Builds are unsigned, so if macOS says the app "is damaged", run `xattr -cr /Applications/PawDF.app` in Terminal, or right-click the app → **Open**.

            The installer bundles the llama.cpp runtime; on first launch PawDF downloads the AI model (~3 GB, one time) — the only moment it needs internet — then runs fully offline. Full walkthrough in the [User Guide](https://github.com/seanrh34/pawdf/blob/main/docs/USER_GUIDE.md).

            ### Highlights
            - Three resizable panels: document library · PDF preview (zoom, page navigator, find-with-highlights) · chat
            - Streamed answers with visible reasoning, markdown formatting, and **clickable page citations** that jump to the source page
            - Automatic summary and two suggested starter questions on every new PDF
            - **Private by design:** no accounts, no telemetry, no web access — verify by turning Wi-Fi off

            See the [full changelog](https://github.com/seanrh34/pawdf/blob/main/CHANGELOG.md) for details.
